<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Library</h1>
     
     <button id="newBookBtn">New Book</button><br><br>

     <dialog id="bookDialog">
        <form id="newBookForm">
            <h3>Add A New Book</h3>
            <label for="title">Title:</label>
            <input type="text" placeholder="Title" name="title" id="title"><br><br>

            <label for="author">Author:</label>
            <input type="text" placeholder="Author" name="author" id="author"><br><br>

            <label for="pages">Number of pages</label>
            <input type="number" name="pages" id="pages"><br><br>
             
            <input type="radio" name="readflag" id="Read" value="Read">
            <label for="Read">Read</label>

            <input type="radio"  name="readflag" id="Not Read" value="Not Read">
            <label for="Not Read">Not Read</label>

            <input type="radio" name="readflag" id="Reading" value="Reading">
            <label for="Reading">Reading</label><br><br>

            <div id="formButtons">
                <button type="button" id="cancelBtn">Cancel</button>
                <button type="submit">Submit</button>
            </div>
        </form>
     </dialog>

    <div id="display">

    </div>
    <script src="main.js"></script>
</body>
</html>
